<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>MUD Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    body {
      margin: 0;
      display: flex;
      font-family: sans-serif;
    }

    #sidebar {
      width: 220px;
      background: #f4f4f4;
      border-right: 1px solid #ccc;
      overflow-y: auto;
      padding: 10px;
    }

    .zone-item {
      padding: 6px;
      cursor: pointer;
      border-bottom: 1px solid #ddd;
    }

    .zone-item:hover {
      background: #ddd;
    }

    #map {
      flex: 1;
      height: 100vh;
    }

    .room-tile {
      width: 20px;
      height: 20px;
      background: rgba(0,120,255,0.7);
      border: 1px solid #000;
      border-radius: 3px;
      position: relative;
      font-size: 10px;
    }

    .room-tile.stub {
      background: rgba(255,80,80,0.7);
      border-style: dashed;
    }

    .arrow {
      position: absolute;
      font-size: 9px;
    }

    .n { top: -2px; left: 6px; }
    .s { bottom: -2px; left: 6px; }
    .e { right: -2px; top: 5px; }
    .w { left: -2px; top: 5px; }

    .u { top: 2px; left: 2px; font-size: 8px; }
    .d { bottom: 2px; right: 2px; font-size: 8px; }

    .z-control {
      position: absolute;
      top: 10px;
      right: 10px;
      background: white;
      padding: 8px;
      border: 1px solid #ccc;
      z-index: 1000;
    }
  </style>
</head>
<body>

<div id="sidebar">
  <h3>Zones</h3>
  <div id="zone-list"></div>
</div>

<div id="map"></div>

<div class="z-control">
  <div>Z-Level: <span id="z-value">0</span></div>
  <button onclick="changeZ(1)">Up</button>
  <button onclick="changeZ(-1)">Down</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const map = L.map('map', {
  crs: L.CRS.Simple,
  minZoom: -5,
  maxZoom: 5
});

map.setView([0, 0], 0);

const scale = 24;

let CURRENT_Z = 0;
let allRooms = [];
let markers = {};
let lines = [];

// ---------- UI: Zone List ----------
const zoneListDiv = document.getElementById('zone-list');

fetch('data/zones.json')
  .then(res => res.json())
  .then(zones => {
    zones.sort((a, b) => a.name.localeCompare(b.name));

    zones.forEach(zone => {
      const div = document.createElement('div');
      div.className = 'zone-item';
      div.textContent = zone.name;

      div.onclick = () => loadZone(zone.file);

      zoneListDiv.appendChild(div);
    });
  });

// ---------- Load Zone ----------
function loadZone(file) {
  fetch(`data/${file}`)
    .then(res => res.json())
    .then(data => {
      allRooms = data;
      CURRENT_Z = 0;
      render();
    });
}

// ---------- Arrow Rendering ----------
function getArrowHTML(exits) {
  let html = '';

  if (exits[0]) html += '<div class="arrow n">↑</div>';
  if (exits[1]) html += '<div class="arrow e">→</div>';
  if (exits[2]) html += '<div class="arrow s">↓</div>';
  if (exits[3]) html += '<div class="arrow w">←</div>';
  if (exits[4]) html += '<div class="arrow u">U</div>';
  if (exits[5]) html += '<div class="arrow d">D</div>';

  return html;
}

// ---------- Render ----------
function render() {
  Object.values(markers).forEach(m => map.removeLayer(m));
  lines.forEach(l => map.removeLayer(l));

  markers = {};
  lines = [];

  const drawn = new Set();

  const visibleRooms = allRooms.filter(r => r.z === CURRENT_Z);

  visibleRooms.forEach(room => {
    const lat = -room.y * scale;
    const lng = room.x * scale;

    const marker = L.marker([lat, lng], {
      icon: L.divIcon({
        html: `<div class="room-tile ${room.stub ? 'stub' : ''}">
                ${getArrowHTML(room.exits || {})}
               </div>`,
        className: '',
        iconSize: [20, 20]
      })
    }).addTo(map);

    marker.bindPopup(`${room.name}<br>VNUM: ${room.vnum}`);
    markers[room.vnum] = marker;
  });

  visibleRooms.forEach(room => {
    const from = markers[room.vnum];
    if (!from) return;

    const fromLatLng = from.getLatLng();

    Object.values(room.exits || {}).forEach(exit => {
      const targetRoom = allRooms.find(r => r.vnum === exit.to_room);
      if (!targetRoom || targetRoom.z !== CURRENT_Z) return;

      const key = [room.vnum, exit.to_room].sort().join('-');
      if (drawn.has(key)) return;
      drawn.add(key);

      const target = markers[exit.to_room];
      if (!target) return;

      const line = L.polyline(
        [fromLatLng, target.getLatLng()],
        { weight: 2 }
      ).addTo(map);

      lines.push(line);
    });
  });

  if (Object.values(markers).length > 0) {
    map.fitBounds(
      Object.values(markers).map(m => m.getLatLng()),
      { padding: [20, 20] }
    );
  }

  document.getElementById('z-value').textContent = CURRENT_Z;
}

// ---------- Z Controls ----------
function changeZ(delta) {
  CURRENT_Z += delta;
  render();
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'PageUp') changeZ(1);
  if (e.key === 'PageDown') changeZ(-1);
});

</script>

</body>
</html>
