    <style>
	html, body {
	  margin: 0;
	  height: 100%;
	  font-family: sans-serif;
	}

	/* Layout */
	.app {
	  display: flex;
	  flex-direction: column;
	  height: 100vh;
	}

	.header {
	  background: #111;
	  color: white;
	  text-align: center;
	  padding: 10px;
	}

	.main {
	  display: flex;
	  flex: 1;
	  overflow: hidden;
	}

	/* Sidebar */
	.sidebar {
	  width: 260px;
	  background: #f4f4f4;
	  padding: 10px;
	  overflow-y: auto;
	  border-right: 1px solid #ccc;
	}

	.panel {
	  margin-bottom: 20px;
	}

	/* Map */
	#map {
	  flex: 1;
	  height: 100%;
	  background: #000;
	}

	#zone-list {
	  max-height: 400px;
	  overflow-y: auto;
	  font-size: 12px;
	}

	.zone-item {
	  padding: 4px;
	  cursor: pointer;
	  border-bottom: 1px solid #ddd;
	}

	.zone-item:hover {
	  background: #eee;
	}
	/* Legend */
	.legend-box {
	  display: inline-block;
	  width: 12px;
	  height: 12px;
	  background: white;
	  margin-right: 6px;
	  border: 1px solid black;
	}

	/* Your existing label styling */
	.zone-label {
	  color: #fff;
	  font-size: 9px;
	  font-weight: bold;
	  max-width: 180px;
	  white-space: normal;
	  text-align: center;
	  line-height: 0.9;
	  text-shadow: 
	    0 0 4px black,
	    0 0 6px black;
	  transform: translate(-50%, -50%);
	  pointer-events: none;

	  display: inline-block;
	  word-break: keep-all;
	}

	.zone-label.highlight {
	  text-shadow:
	    0 0 6px yellow,
	    0 0 10px yellow,
	    0 0 14px orange;
	}

	/* Mobile */
	@media (max-width: 768px) {
	  .main {
	    flex-direction: column;
	  }

	  .sidebar {
	    width: 100%;
	    height: 180px;
	    border-right: none;
	    border-bottom: 1px solid #ccc;
	  }
	}

    crs: L.CRS.Simple,
    zoomDelta: 0.25,
    zoomSnap: 0.25,
    wheelPxPerZoomLevel: 75

  setTimeout(() => {
  map.invalidateSize();
}, 0);

  // --- CLICK HANDLER (FIXED Y AXIS) ---
  map.on('click', function(e) {
    const pixelX = Math.floor(e.latlng.lng);
    const pixelY = Math.floor(e.latlng.lat);

    const tileX = Math.floor(pixelX / squareSize);
    const tileY = Math.floor(pixelY / squareSize);

    // Flip Y so bottom-left = starting vnum
    const flippedY = (mapHeight - 1) - tileY;

    const vnum = startingVnum + (flippedY * mapWidth) + tileX;

    L.popup()
      .setLatLng(e.latlng)
      .setContent(
        `Pixel: (${pixelX}, ${pixelY})<br>` +
        `Tile: (${tileX}, ${tileY})<br>` +
        `World VNUM: ${vnum}`
      )
      .openOn(map);
  });

  // --- OPTIONAL: VNUM -> LOCATION HELPER ---
  function vnumToLatLng(vnum) {
    const offset = vnum - startingVnum;

    const flippedY = Math.floor(offset / mapWidth);
    const tileX = offset % mapWidth;

    // unflip Y
    const tileY = (mapHeight - 1) - flippedY;

    return [
      tileY * squareSize,
      tileX * squareSize
    ];
  }

function createZoneLabel(zone) {
  return L.marker(vnumToLatLng(zone.vnum), {
    icon: L.divIcon({
      className: 'zone-label',
      html: zone.name,
      iconSize: [50, null]
    })
  });
}

const zoneLayer = L.layerGroup();
const zoneIndex = {};

zones.forEach(zone => {
  const marker = createZoneLabel(zone);

  // store reference (handle duplicates)
  const key = zone.name.toLowerCase();
  if (!zoneIndex[key]) zoneIndex[key] = [];
  zoneIndex[key].push(marker);

  zoneLayer.addLayer(marker);
});

zoneLayer.addTo(map);

const zoneList = document.getElementById('zone-list');

zones.forEach(zone => {
  const div = document.createElement('div');
  div.className = 'zone-item';
  div.textContent = zone.name;

  div.addEventListener('click', () => {
    zoomToZone(zone.name);
  });

  zoneList.appendChild(div);
});

function updateLabelScale() {
  const zoom = map.getZoom();

  document.querySelectorAll('.zone-label').forEach(el => {
    const marker = el.closest('.leaflet-marker-icon');

    if (zoom < 1) {
      marker.style.display = "none";
    } else {
      marker.style.display = "block";
    }

    const scale = Math.max(0.9, Math.min(1.4, zoom / 3));
    el.style.fontSize = (9 * scale) + 'px';
  });
}

function searchZone(query) {
  const q = query.toLowerCase().trim();

  if (!q) return;

  const matches = Object.keys(zoneIndex).filter(name =>
    name.includes(q)
  );

  if (matches.length === 0) {
    alert("No matches found");
    return;
  }

  // If only one match → zoom directly
  if (matches.length === 1) {
    zoomToZone(matches[0]);
    return;
  }

  // Multiple matches → zoom to all
  zoomToMultipleZones(matches);
}

function zoomToMultipleZones(names) {
  const allMarkers = [];

  names.forEach(name => {
    zoneIndex[name].forEach(marker => {
      allMarkers.push(marker);
    });
  });

  const group = L.featureGroup(allMarkers);

  map.fitBounds(group.getBounds(), {
    padding: [50, 50]
  });
}

function zoomToZone(name) {
  const key = name.toLowerCase();

  if (!zoneIndex[key]) {
    alert("Zone not found");
    return;
  }

  const markers = zoneIndex[key];

  // If multiple matches, use first (or extend later)
  const marker = markers[0];
  const latlng = marker.getLatLng();

  // Smooth zoom + center
  map.setView(latlng, Math.max(map.getZoom(), 2), {
    animate: true
  });

  // Optional: popup
  marker.bindPopup(name).openPopup();

  // Optional: highlight
  highlightMarker(marker);
}

function highlightMarker(marker) {
  const el = marker.getElement();
  if (!el) return;

  el.classList.add("highlight");

  setTimeout(() => {
    el.classList.remove("highlight");
  }, 2000);
}

function centerOnVnum(vnum) {
  const offset = vnum - startingVnum;

  const flippedY = Math.floor(offset / mapWidth);
  const tileX = offset % mapWidth;

  const tileY = (mapHeight - 1) - flippedY;

  const lat = tileY * squareSize;
  const lng = tileX * squareSize;

  map.setView([lat, lng], 0);
}

centerOnVnum(552212);

// Toggle labels
document.getElementById('toggle-labels').addEventListener('change', (e) => {
  if (e.target.checked) {
    map.addLayer(zoneLayer);
  } else {
    map.removeLayer(zoneLayer);
  }
});

const input = document.getElementById('zone-search');
const searchBtn = document.getElementById('search-btn');

searchBtn.addEventListener('click', () => {
  searchZone(input.value);
});

// Press Enter to search
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    searchZone(input.value);
  }
});
